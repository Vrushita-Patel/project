<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in · GitHub Clone</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header-dark">
      <div class="header-container">
        <a href="index.html" class="logo" aria-label="GitHub Home">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path
              fill="currentColor"
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
            />
          </svg>
        </a>
        <div class="header-right">
          <a class="sign-in" href="signup.html">Sign up</a>
        </div>
      </div>
    </header>

    <main class="auth-page">
      <div class="auth-card" role="region" aria-label="Sign in">
        <h1>Sign in to GitHub</h1>
        <p class="auth-subtitle">Welcome back.</p>

        <form class="auth-form" id="signinForm" autocomplete="on">
          <label>
            Username
            <input
              type="text"
              required
              name="username"
              placeholder="username"
            />
          </label>
          <label>
            Password
            <input
              type="password"
              required
              name="password"
              placeholder="••••••••"
            />
          </label>

          <button type="submit" class="auth-primary">Sign in</button>

          <div class="auth-error" id="authError" aria-live="polite"></div>

          <div class="auth-footer">
            <span>New here?</span>
            <a href="signup.html">Create an account</a>
          </div>
        </form>
      </div>
    </main>

    <script>
      const form = document.getElementById("signinForm");
      const errorEl = document.getElementById("authError");

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        errorEl.textContent = "";

        const data = Object.fromEntries(new FormData(form));
        const stored = JSON.parse(
          localStorage.getItem("gh_clone_user") || "null",
        );

        if (!stored) {
          errorEl.textContent = "No account found. Please sign up first.";
          return;
        }

        if (
          stored.username !== data.username ||
          stored.password !== data.password
        ) {
          errorEl.textContent = "Incorrect username or password.";
          return;
        }

        // Demo success
        alert("Signed in successfully!");
        window.location.href = "dashboard.html";
      });
    </script>
  </body>
</html>
